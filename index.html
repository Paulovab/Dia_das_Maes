<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIA DAS MÃES - CELEBRAÇÃO</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-image: url('./assets/fotos/foto8.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #004d40;
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .hero-inicial {
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(255, 255, 255, 0.6); 
      position: fixed;
      z-index: 2000;
      top: 0;
      left: 0;
    }

    .btn-surpresa {
      margin-top: 25px;
      padding: 18px 35px;
      border: 2px solid #4db6ac;
      border-radius: 50px;
      font-size: 1.1rem;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #00897b;
      animation: pulseBtn 2s infinite;
    }

    @keyframes pulseBtn {
      0% { transform: scale(1); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    #conteudo {
      display: none;
      width: 100%;
      max-width: 650px;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .cartao-crianca {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 15px;
      margin-top: 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    /* QUADRO DAS FOTOS */
    .slider-container {
      width: 100%;
      max-width: 550px;
      aspect-ratio: 1 / 1;
      margin: 0 auto 30px auto;
      background: #000;
      border: 10px solid white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .slide-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide-wrapper.active { opacity: 1; }

    /* Fundo desfocado para não ter bordas pretas */
    .bg-blur {
      position: absolute;
      width: 110%;
      height: 110%;
      object-fit: cover;
      filter: blur(15px) brightness(0.7);
      z-index: 1;
    }

    /* Foto principal: Inteira e sem cortes */
    .img-main {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .party {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      animation: fallDown linear forwards;
    }

    @keyframes fallDown {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    footer {
      padding: 40px 0;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <section id="intro" class="hero-inicial">
    <h1>Para a melhor mãe do mundo...</h1>
    <button class="btn-surpresa" onclick="abrirSurpresa()">Clique para abrir ✨</button>
  </section>

  <div id="conteudo">
    <div class="cartao-crianca">
      <h1>Feliz Dia das Mães!</h1>
      <p class="mensagem-fofa">
        Obrigado por ser minha mãe, minha amiga e por me ensinar tantas coisas nesses 10 anos. <br><br>
        Você é muito especial para mim. Eu te amo muito! ❤️
      </p>
    </div>

    <div class="slider-container" id="meuSlider"></div>

    <footer>Com todo o meu amor! 🌼</footer>
  </div>

  <audio id="musica" loop>
    <source src="./assets/musica/trilha.mp3" type="audio/mpeg">
  </audio>

  <script>
    const fotos = [];
    for (let i = 1; i <= 15; i++) {
      fotos.push(`./assets/fotos/foto${i}.jpg`);
    }

    function abrirSurpresa() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('conteudo').style.display = 'block';
      document.getElementById('musica').play().catch(e => {});
      setInterval(createCelebrationItem, 250);
    }

    const container = document.getElementById('meuSlider');
    fotos.forEach((src, index) => {
      const wrapper = document.createElement('div');
      wrapper.className = index === 0 ? 'slide-wrapper active' : 'slide-wrapper';
      
      // Imagem de fundo (desfocada)
      const imgBlur = document.createElement('img');
      imgBlur.src = src;
      imgBlur.className = 'bg-blur';
      
      // Imagem principal (inteira)
      const imgMain = document.createElement('img');
      imgMain.src = src;
      imgMain.className = 'img-main';
      
      wrapper.appendChild(imgBlur);
      wrapper.appendChild(imgMain);
      container.appendChild(wrapper);
    });

    let currentSlide = 0;
    setInterval(() => {
      const slides = document.querySelectorAll('.slide-wrapper');
      if(slides.length > 1) {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }
    }, 3500);

    function createCelebrationItem() {
      const item = document.createElement('div');
      item.classList.add('party');
      item.innerHTML = ['❤️', '✨', '🌸', '⭐'][Math.floor(Math.random() * 4)];
      item.style.left = Math.random() * 100 + 'vw';
      item.style.top = '-20px';
      item.style.animationDuration = Math.random() * 3 + 2 + 's';
      document.body.appendChild(item);
      setTimeout(() => item.remove(), 5000);
    }
  </script>
</body>
</html>
