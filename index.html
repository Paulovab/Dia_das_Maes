<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIA DAS MÃES - CELEBRAÇÃO</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset e Configurações de Fundo */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* Adicionando a foto4.jpg como fundo de todas as páginas */
      background-image: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), url('./assets/fotos/foto4.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      
      color: #004d40;
      font-family: 'Lato', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Tela Inicial */
    .hero-inicial {
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      /* Fundo da tela inicial com transparência para ver a foto4 ao fundo */
      background: rgba(255, 255, 255, 0.85); 
      padding: 20px;
      position: fixed;
      z-index: 2000;
      top: 0;
      left: 0;
    }

    .btn-surpresa {
      margin-top: 25px;
      padding: 18px 35px;
      border: 2px solid #4db6ac;
      border-radius: 50px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #00897b;
      animation: pulseBtn 2s infinite;
      transition: all 0.3s;
    }

    @keyframes pulseBtn {
      0% { transform: scale(1); }
      70% { transform: scale(1.05); box-shadow: 0 0 15px rgba(77, 182, 172, 0.3); }
      100% { transform: scale(1); }
    }

    /* Conteúdo Principal */
    #conteudo {
      display: none;
      width: 100%;
      max-width: 600px;
      padding: 20px;
      text-align: center;
      animation: fadeIn 1.5s ease;
      /* Garante que o conteúdo role sobre o fundo fixo */
      position: relative;
      z-index: 10;
    }

    .cartao-crianca {
      background: rgba(255, 255, 255, 0.9); /* Branco semi-transparente para ler melhor */
      padding: 35px 25px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      margin-top: 40px;
      margin-bottom: 30px;
      border: 1px solid rgba(224, 242, 241, 0.5);
      backdrop-filter: blur(5px); /* Efeito de vidro fosco */
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .mensagem-fofa {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #222;
    }

    /* Slideshow */
    .slider-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 450px;
      margin: 0 auto 30px auto;
      background: #fff;
      border: 10px solid white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover; 
      background-color: #f9f9f9; 
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .slide.active { opacity: 1; }

    /* Partículas */
    .party {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      animation: fallDown linear forwards;
    }

    @keyframes fallDown {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    footer {
      padding: 40px 0;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.2rem;
      text-shadow: 1px 1px 2px white; /* Sombra branca para ler no fundo */
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .mensagem-fofa { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <section id="intro" class="hero-inicial">
    <h1 style="font-family: 'Playfair Display', serif;">Para uma pessoa especial...</h1>
    <button class="btn-surpresa" onclick="abrirSurpresa()">Clique para abrir ✨</button>
  </section>

  <div id="conteudo">
    <div class="cartao-crianca">
      <h1>Feliz Dia das Mães!</h1>
      <p class="mensagem-fofa">
        Hoje é um dia especial para celebrar todo o amor que você nos dá. <br><br>
        Obrigado por cuidar de nós com tanto carinho e por tornar tudo mais feliz. Você merece o melhor dia de todos! <br><br>
        Te amamos muito! ❤️
      </p>
    </div>

    <div class="slider-container" id="meuSlider"></div>

    <footer>
      Com todo o nosso amor! 🌼
    </footer>
  </div>

  <audio id="musica" loop>
    <source src="./assets/musica/trilha.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Mantendo a foto 4 no carrossel também, se desejar
    const fotos = [
      './assets/fotos/foto1.jpg',
      './assets/fotos/foto2.jpg',
      './assets/fotos/foto3.jpg',
      './assets/fotos/foto4.jpg'
    ];

    function abrirSurpresa() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('conteudo').style.display = 'block';
      
      const audio = document.getElementById('musica');
      audio.play().catch(e => console.log("Áudio aguardando..."));

      setInterval(createCelebrationItem, 250);
    }

    const container = document.getElementById('meuSlider');
    fotos.forEach((src, index) => {
      const img = document.createElement('img');
      img.src = src;
      img.className = index === 0 ? 'slide active' : 'slide';
      container.appendChild(img);
    });

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    setInterval(() => {
      if(slides.length > 0) {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }
    }, 3500);

    function createCelebrationItem() {
      const item = document.createElement('div');
      const icons = ['❤️', '✨', '🌸', '⭐'];
      item.classList.add('party');
      item.innerHTML = icons[Math.floor(Math.random() * icons.length)];
      item.style.left = Math.random() * 100 + 'vw';
      item.style.top = '-20px';
      item.style.fontSize = Math.random() * 15 + 15 + 'px';
      item.style.animationDuration = Math.random() * 3 + 2 + 's';
      item.style.opacity = Math.random();
      document.body.appendChild(item);
      setTimeout(() => item.remove(), 5000);
    }
  </script>
</body>
</html>
